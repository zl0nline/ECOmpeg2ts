name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/ecompeg2ts-${{ matrix.suffix }}" ./cmd/ecompeg2ts
          sha256sum "dist/ecompeg2ts-${{ matrix.suffix }}" > "dist/ecompeg2ts-${{ matrix.suffix }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecompeg2ts-${{ matrix.suffix }}
          path: |
            dist/ecompeg2ts-${{ matrix.suffix }}
            dist/ecompeg2ts-${{ matrix.suffix }}.sha256

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ecompeg2ts-${{ matrix.suffix }}
            dist/ecompeg2ts-${{ matrix.suffix }}.sha256
